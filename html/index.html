          class="logo"

          viewBox="0 0 900 200"

          <g

            stroke-linecap="line"
            stroke-linejoin="line"
            stroke-width="1"

            <g stroke="#63c44d" stroke-width="7">

              <g id="branch">

                <line x1="100" y1="100" x2="100" y2="30" />
                <!-- Dientes -->
                <line x1="100" y1="45" x2="85" y2="35" />
                <line x1="100" y1="45" x2="115" y2="35" />
                <line x1="100" y1="70" x2="85" y2="60" />
                <line x1="100" y1="70" x2="115" y2="60" />

              <use href="#branch" transform="rotate(60 100 100)" />
              <use href="#branch" transform="rotate(120 100 100)" />
              <use href="#branch" transform="rotate(180 100 100)" />
              <use href="#branch" transform="rotate(240 100 100)" />
              <use href="#branch" transform="rotate(300 100 100)" />
            </g>
            <!-- TEXTO -->
            <text
              x="190"
              y="140"
              fill="rgb(255, 255, 255)"
              font-size="100"
              font-family="system-ui, sans-serif"
              font-weight="bold"
              letter-spacing="2"
            >
              FRIO ORTIZ
            </text>
          </g>
