<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Friortiz — Inicio</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <header class="main-header">
      <a href="index.html" class="logo-link" aria-label="Ir al inicio">
        <svg
          class="logo"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 900 200"
          preserveAspectRatio="xMinYMid meet"
        >
          <g
            fill="none"
            stroke-linecap="line"
            stroke-linejoin="line"
            stroke-width="1"
          >
            <!-- COPO DE NIEVE -->
            <g stroke="#63c44d" stroke-width="7">
              <!-- BRAZO DEFINITIVO (fiel al copo original) -->
              <!-- BRAZO SIMPLE Y FIEL -->
              <g id="branch">
                <!-- Tronco -->
                <line x1="100" y1="100" x2="100" y2="30" />
                <!-- Dientes -->
                <line x1="100" y1="45" x2="85" y2="35" />
                <line x1="100" y1="45" x2="115" y2="35" />
                <line x1="100" y1="70" x2="85" y2="60" />
                <line x1="100" y1="70" x2="115" y2="60" />
              </g>
              <use href="#branch" transform="rotate(60 100 100)" />
              <use href="#branch" transform="rotate(120 100 100)" />
              <use href="#branch" transform="rotate(180 100 100)" />
              <use href="#branch" transform="rotate(240 100 100)" />
              <use href="#branch" transform="rotate(300 100 100)" />
            </g>
            <!-- TEXTO -->
            <text
              x="190"
              y="140"
              fill="rgb(255, 255, 255)"
              font-size="100"
              font-family="system-ui, sans-serif"
              font-weight="bold"
              letter-spacing="2"
            >
              FRIO ORTIZ
            </text>
          </g>
        </svg>
      </a>

      <input
        type="checkbox"
        id="nav-toggle"
        class="nav-toggle"
        aria-label="Abrir menú"
      />
      <label for="nav-toggle" class="nav-toggle-btn" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <nav class="main-navigation">
        <ul>
          <li><a class="navigation-element" href="index.html">Inicio</a></li>
          <li>
            <a class="navigation-element" href="productos.html">Productos</a>
          </li>
          <li>
            <a class="navigation-element" href="contacto.html">Contacto</a>
          </li>
          <li>
            <a class="navigation-element" href="trabajo.html"
              >Trabaja Con Nosotros</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main></main>
  </body>
</html>
