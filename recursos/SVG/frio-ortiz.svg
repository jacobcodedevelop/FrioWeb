<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7000 200">
  <g fill="none" stroke-linecap="line" stroke-linejoin="line" stroke-width="1">

    <!-- COPO DE NIEVE -->
    <g stroke="#63c44d" stroke-width="6">

<!-- BRAZO DEFINITIVO (fiel al copo original) -->
<!-- BRAZO SIMPLE Y FIEL -->
<g id="branch">

  <!-- Tronco -->
  <line x1="100" y1="100" x2="100" y2="30"/>

  <!-- Dientes -->
  <line x1="100" y1="45" x2="85" y2="35"/>
  <line x1="100" y1="45" x2="115" y2="35"/>

  <line x1="100" y1="70" x2="85" y2="60"/>
  <line x1="100" y1="70" x2="115" y2="60"/>

</g>

<use href="#branch" transform="rotate(60 100 100)"/>
<use href="#branch" transform="rotate(120 100 100)"/>
<use href="#branch" transform="rotate(180 100 100)"/>
<use href="#branch" transform="rotate(240 100 100)"/>
<use href="#branch" transform="rotate(300 100 100)"/>
    </g>

    <!-- TEXTO -->
    <text
      x="200"
      y="120"
      fill="#e53935"
      font-size="50"
      font-family="Arial, Helvetica, sans-serif"
      font-weight="bold"
      letter-spacing="2">
      FRIO ORTIZ, S.L.
    </text>

  </g>
</svg>